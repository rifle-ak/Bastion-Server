roles:
  bastion:
    allowed_commands:
      - "uptime"
      - "df -h"
      - "df -h *"
      - "free -h"
      - "ps aux"
      - "ps aux *"
      - "top -bn1"
      - "dmesg *"
      - "ping -c * *"
      # Network diagnostics
      - "ss *"
      - "ss -tulpn"
      - "netstat *"
      - "netstat -tulpn"
      - "lsof -i"
      - "lsof -i *"
      - "ip addr"
      - "ip addr *"
      - "ip route"
      - "ip route *"
      # Process inspection
      - "pgrep *"
      - "pkill *"                                        # REQUIRES APPROVAL
      # Systemd
      - "systemctl status *"
      - "systemctl list-units *"
      - "systemctl list-units --failed"
      - "systemctl is-active *"
      - "journalctl -u * --no-pager -n *"
      - "journalctl -u * --no-pager -n * --since *"
      - "journalctl -u * --no-pager --since *"
      - "journalctl -xe"
      - "journalctl -xe --no-pager"
      - "journalctl -xe --no-pager -n *"
      # Docker: listing, logs, inspection, networking, volumes
      - "docker ps"
      - "docker ps *"
      - "docker logs *"
      - "docker inspect *"
      - "docker stats --no-stream"
      - "docker stats --no-stream *"
      - "docker top *"
      - "docker network ls"
      - "docker network ls *"
      - "docker network inspect *"
      - "docker volume ls"
      - "docker volume ls *"
      - "docker volume inspect *"
      - "docker images"
      - "docker images *"
      # File system search (within allowed paths)
      - "find /var/log *"
      - "find /etc *"
      - "find /home/claude-agent *"
      - "find /opt *"
      - "grep -r * /var/log/*"
      - "grep -r * /etc/*"
      - "grep -r * /home/claude-agent/*"
      - "grep -r * /opt/*"
      - "grep -rn * /var/log/*"
      - "grep -rn * /etc/*"
      - "grep -rl * /var/log/*"
      - "grep -rl * /etc/*"
      # File reading
      - "cat /var/log/*"
      - "tail -n * /var/log/*"
      - "tail -f /var/log/*"
      - "cat /opt/*"
      - "tail -n * /opt/*"
      - "tail -f /opt/*"
    allowed_paths_read:
      - /var/log/
      - /etc/
      - /home/claude-agent/
      - /opt/
      - /srv/
    allowed_paths_write: []

