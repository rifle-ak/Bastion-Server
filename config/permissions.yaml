      - "ls -l /var/lib/pterodactyl/volumes/*"
      - "ls /var/lib/pterodactyl/volumes/*"
      # Pterodactyl: send commands to game server console (REQUIRES APPROVAL)
      - "docker exec * rcon *"
      # ── Container management (REQUIRES APPROVAL) ──
      - "docker restart *"
      - "docker start *"
      - "docker stop *"
      - "docker kill *"
      - "systemctl restart *"
      - "systemctl stop *"
